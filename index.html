<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MeowTI</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=LXGW+WenKai+TC:wght@400;700&family=Ma+Shan+Zheng&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --orange: #f59e0b;
        --brown: #5f4b32;
        --card: rgba(255, 255, 255, 0.9);
        --tag-bg: #f5e7b5;
        --tag-text: #6b5336;
        --option-bg: rgba(255, 255, 255, 0.92);
        --option-border: #f1e5c8;
        --muted: #948872;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "LXGW WenKai TC", "Ma Shan Zheng", "PingFang HK",
          "Microsoft JhengHei", cursive, sans-serif;
        color: var(--brown);
        min-height: 100vh;
        background: linear-gradient(
          rgba(255, 248, 220, 0.65),
          rgba(255, 248, 220, 0.78)
        );
      }

      .container {
        max-width: 620px;
        margin: 0 auto;
        padding: 18px 16px 28px;
      }

      .hidden {
        display: none !important;
      }

      .page-card {
        background: var(--card);
        backdrop-filter: blur(2px);
        border-radius: 32px;
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.08);
        border: 1px solid rgba(229, 231, 235, 0.9);
        margin-top: 18px;
        padding: 34px 28px;
      }

      .center {
        text-align: center;
      }

      .creator-note {
        width: 100%;
        text-align: center;
        margin-top: 14px;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.7;
      }

      .creator-note a {
        color: var(--orange);
        text-decoration: none;
        font-weight: 700;
      }

      .top-mini-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 14px;
      }

      .mini-btn {
        background: none;
        border: none;
        color: var(--brown);
        font-size: 20px;
        cursor: pointer;
        padding: 4px 6px;
      }

      .mini-title {
        font-weight: 700;
        font-size: 15px;
        color: var(--brown);
        flex: 1;
        text-align: center;
      }

      .lang-switch {
        background: none;
        border: none;
        color: var(--orange);
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        padding: 4px 6px;
      }

      .home-page {
        min-height: calc(100vh - 46px);
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 30px 6px 36px;
        background:
          linear-gradient(rgba(255, 248, 220, 0.38), rgba(255, 248, 220, 0.55)),
          url("background.png") center/cover no-repeat;
        border-radius: 32px;
      }

      .home-inner {
        width: 100%;
      }

      .home-top {
        display: flex;
        justify-content: flex-end;
        margin-bottom: 18px;
      }

      .home-brand {
        font-size: 16px;
        font-weight: 700;
        color: #b88a2d;
        letter-spacing: 0.4px;
        margin-bottom: 16px;
      }

      .home-title {
        font-size: 46px;
        font-weight: 700;
        line-height: 1.22;
        color: var(--brown);
        margin-bottom: 28px;
      }

      .primary-btn {
        width: 100%;
        background: var(--orange);
        color: #fff;
        font-weight: 700;
        border: none;
        border-radius: 18px;
        padding: 16px;
        cursor: pointer;
        font-size: 16px;
        box-shadow: 0 10px 18px rgba(245, 158, 11, 0.22);
        transition: 0.18s ease;
      }

      .primary-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 14px 22px rgba(245, 158, 11, 0.28);
        filter: brightness(1.02);
      }

      .secondary-btn {
        width: 100%;
        background: #f8f8f8;
        color: #8e8e8e;
        border: 1px solid #ececec;
        border-radius: 16px;
        padding: 12px 14px;
        cursor: pointer;
        font-size: 14px;
        transition: 0.18s ease;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
      }

      .secondary-btn:hover {
        background: #f3f3f3;
        transform: translateY(-1px);
      }

      .share-btn {
        width: 100%;
        background: rgba(255, 255, 255, 0.96);
        color: var(--brown);
        font-weight: 700;
        border: 1px solid #efe3bf;
        border-radius: 16px;
        padding: 13px 14px;
        cursor: pointer;
        font-size: 15px;
        transition: 0.18s ease;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.03);
        margin-bottom: 12px;
      }

      .share-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 18px rgba(0, 0, 0, 0.08);
        background: #fffaf0;
      }

      #loading-layer {
        position: fixed;
        inset: 0;
        background: rgba(255, 255, 255, 0.98);
        z-index: 9999;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        padding: 20px;
      }

      #loading-video {
        width: 100%;
        max-width: 420px;
        background: #fff;
        border-radius: 22px;
        display: block;
      }

      #loading-text {
        margin-top: 14px;
        font-size: 15px;
        font-weight: 700;
        color: var(--brown);
        text-align: center;
      }

      .quiz-tip {
        text-align: center;
        font-size: 12px;
        color: #9c9589;
        margin: 0;
        line-height: 1.6;
        min-height: 20px;
      }

      .progress-wrap {
        width: 100%;
        background: #fff3c4;
        height: 10px;
        border-radius: 999px;
        position: relative;
        margin: 0 0 18px;
      }

      .progress-bar {
        width: 0%;
        height: 100%;
        background: var(--orange);
        border-radius: 999px;
        transition: 0.4s ease;
      }

      .cat-runner {
        position: absolute;
        top: -24px;
        left: 0%;
        transform: translateX(-50%);
        transition: 0.4s ease;
        font-size: 19px;
      }

      .progress-text {
        text-align: center;
        font-size: 14px;
        color: var(--orange);
        font-weight: 700;
        margin-bottom: 14px;
      }

      .question-title {
        text-align: center;
        font-size: 26px;
        font-weight: 800;
        line-height: 1.45;
        margin-bottom: 18px;
        color: var(--brown);
      }

      .option-btn {
        width: 100%;
        display: block;
        text-align: left;
        background: var(--option-bg);
        border: 1.5px solid var(--option-border);
        border-radius: 18px;
        padding: 18px 18px;
        margin-bottom: 14px;
        color: var(--brown);
        font-size: 15px;
        line-height: 1.65;
        cursor: pointer;
        transition: 0.18s ease;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.03);
      }

      .option-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 18px rgba(0, 0, 0, 0.08);
        background: #fffaf0;
      }

      .result-title {
        text-align: center;
        font-size: 20px;
        font-weight: 700;
        color: var(--brown);
        margin-bottom: 8px;
      }

      .result-type {
        text-align: center;
        font-size: 34px;
        font-weight: 800;
        color: var(--orange);
        margin-bottom: 14px;
        line-height: 1.3;
      }

      .cat-img {
        width: 100%;
        max-width: 300px;
        display: block;
        margin: 0 auto;
        border-radius: 20px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
        object-fit: cover;
        aspect-ratio: 4 / 3;
        background: rgba(255, 255, 255, 0.85);
      }

      .result-tags {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 10px;
        margin: 16px 0 10px;
      }

      .result-tag {
        background: var(--tag-bg);
        color: var(--tag-text);
        padding: 8px 16px;
        border-radius: 999px;
        font-size: 13px;
      }

      .sub-cat-line {
        text-align: center;
        margin-top: 10px;
        margin-bottom: 2px;
        color: var(--muted);
        font-size: 15px;
        line-height: 1.7;
      }

      .result-desc {
        text-align: center;
        line-height: 1.85;
        font-size: 17px;
        color: #6d5a3a;
        margin-top: 22px;
        margin-bottom: 22px;
        white-space: pre-line;
      }

      .result-extra-link {
        display: inline-block;
        margin-top: 14px;
        color: var(--muted);
        font-size: 14px;
        text-decoration: none;
        cursor: pointer;
        transition: 0.18s ease;
      }

      .result-extra-link:hover {
        color: var(--brown);
      }

      .wiki-card {
        text-align: center;
        padding: 10px 0 30px;
      }

      .wiki-name {
        font-size: 24px;
        font-weight: 800;
        color: var(--brown);
        margin: 16px 0 10px;
      }

      .wiki-short {
        text-align: center;
        color: var(--muted);
        font-size: 15px;
        margin-top: 8px;
        margin-bottom: 4px;
      }

      .wiki-desc {
        margin-top: 18px;
        color: #6d5a3a;
        font-size: 16px;
        padding: 0 12px;
        text-align: left;
      }

      .wiki-desc p {
        margin: 0 0 14px;
        line-height: 1.9;
      }

      .wiki-desc p:last-child {
        margin-bottom: 0;
      }

      .dots {
        display: flex;
        gap: 8px;
        align-items: center;
        justify-content: center;
      }

      .dot {
        width: 9px;
        height: 9px;
        border-radius: 999px;
        background: #e8ddc0;
        display: inline-block;
      }

      .dot.active {
        background: var(--orange);
      }

      @media (max-width: 640px) {
        .container {
          padding: 14px 12px 22px;
        }
        .page-card {
          padding: 28px 22px;
          border-radius: 26px;
        }
        .home-title {
          font-size: 38px;
        }
        .question-title {
          font-size: 23px;
        }
        .result-type {
          font-size: 30px;
        }
      }
    </style>
  </head>
  <body>
    <div id="loading-layer" class="hidden">
      <video id="loading-video" muted playsinline preload="auto">
        <source src="loading-cat.mp4" type="video/mp4" />
      </video>
      <div id="loading-text"></div>
    </div>

    <div class="container">
      <div id="home" class="page home-page">
        <div class="home-inner">
          <div class="home-top">
            <button class="lang-switch" onclick="toggleLang()">EN / 中</button>
          </div>
          <div id="home-brand" class="home-brand"></div>
          <div id="home-title" class="home-title"></div>
          <button id="start-btn" class="primary-btn" onclick="startQuiz()"></button>
          <div id="home-creator" class="creator-note"></div>
        </div>
      </div>

      <div id="quiz" class="page hidden">
        <div class="page-card">
          <div class="top-mini-bar">
            <button class="mini-btn" onclick="showPage('home')">×</button>
            <div class="mini-title">MeowTI</div>
            <button class="lang-switch" onclick="toggleLang()">EN / 中</button>
          </div>

          <p id="quiz-tip" class="quiz-tip"></p>
          <br />

          <div class="progress-wrap">
            <div id="progress-bar" class="progress-bar"></div>
            <div id="cat-runner" class="cat-runner">🐱</div>
          </div>

          <div id="progress" class="progress-text"></div>
          <div id="question" class="question-title"></div>
          <div id="options"></div>

          <button id="prev-btn" class="secondary-btn hidden" onclick="prevQuestion()"></button>
        </div>
      </div>

      <div id="result" class="page hidden">
        <div class="page-card" id="result-capture-card">
          <div class="top-mini-bar">
            <button class="mini-btn" onclick="showPage('home')">×</button>
            <div class="mini-title">MeowTI</div>
            <button class="lang-switch" onclick="toggleLang()">EN / 中</button>
          </div>

          <div id="result-title" class="result-title"></div>
          <div id="type" class="result-type"></div>
          <img id="catImg" class="cat-img" alt="result cat" />
          <div id="result-tags" class="result-tags"></div>
          <div id="subCat" class="sub-cat-line hidden"></div>
          <div id="desc" class="result-desc"></div>

          <button id="share-btn" class="share-btn" onclick="saveResultAsImage()"></button>
          <button id="retry-btn" class="primary-btn" onclick="location.reload()"></button>

          <div class="center">
            <a id="gallery-link" class="result-extra-link" onclick="showPage('info')"></a>
          </div>
        </div>

        <div id="result-creator" class="creator-note"></div>
      </div>

      <div id="info" class="page hidden">
        <div class="page-card">
          <div class="top-mini-bar">
            <button class="mini-btn" onclick="showPage('home')">←</button>
            <div id="gallery-title" class="mini-title"></div>
            <button class="lang-switch" onclick="toggleLang()">EN / 中</button>
          </div>

          <div id="encyclopedia-content"></div>

          <div style="display:flex;justify-content:space-between;align-items:center;gap:16px;margin-top:18px;">
            <button id="prev-cat-btn" class="secondary-btn" style="width:auto;padding:10px 18px;" onclick="changeEncyclopedia(-1)"></button>
            <div id="encyclopedia-dots" class="dots"></div>
            <button id="next-cat-btn" class="secondary-btn" style="width:auto;padding:10px 18px;" onclick="changeEncyclopedia(1)"></button>
          </div>

          <div class="center" style="margin-top: 18px;">
            <button id="back-home-btn" class="secondary-btn" style="max-width: 220px;" onclick="showPage('home')"></button>
          </div>
        </div>
      </div>
    </div>

      function textOf(key) {
        return uiText[currentLang][key];
      }

      function showPage(pageId) {
        document.querySelectorAll(".page").forEach((p) => p.classList.add("hidden"));
        document.getElementById(pageId).classList.remove("hidden");
        if (pageId === "info") renderEncyclopedia();
      }

      function resetScores() {
        return {
          ragdoll: 0,
          maine: 0,
          siamese: 0,
          british: 0,
          black: 0,
          cow: 0,
          tabby: 0,
          chinchilla: 0
        };
      }

      let scores = resetScores();

      function updateStaticUI() {
        document.getElementById("home-brand").innerText = textOf("homeBrand");
        document.getElementById("home-title").innerHTML = textOf("homeTitle");
        document.getElementById("start-btn").innerText = textOf("startBtn");
        document.getElementById("loading-text").innerText = textOf("loading");
        document.getElementById("prev-btn").innerText = textOf("prevQuestion");
        document.getElementById("result-title").innerText = textOf("resultTitle");
        document.getElementById("share-btn").innerText = textOf("share");
        document.getElementById("retry-btn").innerText = textOf("retry");
        document.getElementById("gallery-link").innerText = textOf("seeOthers");
        document.getElementById("gallery-title").innerText = textOf("gallery");
        document.getElementById("prev-cat-btn").innerText = textOf("prevCat");
        document.getElementById("next-cat-btn").innerText = textOf("nextCat");
        document.getElementById("back-home-btn").innerText = textOf("backHome");

        const creatorHTML = `${textOf("creatorPrefix")} <a href="${textOf("creatorUrl")}" target="_blank">${textOf("creatorHandle")}</a>`;
        document.getElementById("home-creator").innerHTML = creatorHTML;
        document.getElementById("result-creator").innerHTML = creatorHTML;
      }

      function toggleLang() {
        currentLang = currentLang === "zh" ? "en" : "zh";
        updateStaticUI();

        if (!document.getElementById("quiz").classList.contains("hidden")) showQuestion();
        if (!document.getElementById("result").classList.contains("hidden")) updateResultUI();
        if (!document.getElementById("info").classList.contains("hidden")) renderEncyclopedia();
      }

      function startQuiz() {
        const loader = document.getElementById("loading-layer");
        const video = document.getElementById("loading-video");

        updateStaticUI();
        loader.classList.remove("hidden");

        if (video) {
          video.currentTime = 0;
          const playPromise = video.play();
          if (playPromise !== undefined) playPromise.catch(() => {});
        }

        setTimeout(() => {
          index = 0;
          answerHistory = [];
          scores = resetScores();
          currentCat = null;
          secondaryCat = null;
          loader.classList.add("hidden");
          showPage("quiz");
          showQuestion();
        }, 2200);
      }

      function updateQuizTip() {
        const pool = quizTips[currentLang];
        document.getElementById("quiz-tip").innerText =
          pool[Math.floor(Math.random() * pool.length)];
      }

      function showQuestion() {
        const q = questions[index];
        document.getElementById("question").innerText =
          currentLang === "zh" ? q.zh : q.en;
        document.getElementById("progress").innerText = `${index + 1} / ${questions.length}`;

        const percent = ((index + 1) / questions.length) * 100;
        document.getElementById("progress-bar").style.width = percent + "%";
        document.getElementById("cat-runner").style.left = percent + "%";

        document.getElementById("prev-btn").classList.toggle("hidden", index === 0);
        document.getElementById("prev-btn").innerText = textOf("prevQuestion");

        let html = "";
        q.options.forEach((opt, i) => {
          const label = currentLang === "zh" ? opt.zh : opt.en;
          html += `<button class="option-btn" onclick="answer(${i})">${label}</button>`;
        });
        document.getElementById("options").innerHTML = html;
        updateQuizTip();
      }

      function addScores(addObj) {
        for (const key in addObj) scores[key] += addObj[key];
      }

      function subtractScores(addObj) {
        for (const key in addObj) scores[key] -= addObj[key];
      }

      function answer(optionIndex) {
        const selected = questions[index].options[optionIndex];
        addScores(selected.add);
        answerHistory.push(optionIndex);
        index++;

        if (index < questions.length) {
          showQuestion();
        } else {
          calculateResult();
        }
      }

      function prevQuestion() {
        if (index > 0) {
          index--;
          const prevOptionIndex = answerHistory.pop();
          const prevOption = questions[index].options[prevOptionIndex];
          subtractScores(prevOption.add);
          showQuestion();
        }
      }

      function calculateResult() {
        const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
        const [mainKey, mainScore] = sorted[0];
        const [subKey, subScore] = sorted[1];

        currentCat = mainKey;
        secondaryCat = mainScore - subScore <= 3 ? subKey : null;

        showPage("result");
        updateResultUI();
      }

      function secondaryLine(mainKey, subKey) {
        if (!subKey) return "";
        const subName = catData[subKey][currentLang].name.replace(/[\u{1F300}-\u{1FAFF}]/gu, "").trim();

        if (currentLang === "zh") {
          const lines = {
            black: `你身上也有一点 ${subName} 的影子。`,
            cow: `你偶爾也會切到 ${subName} 的頻道。`,
            tabby: `除了主貓格，你也带一点 ${subName} 的生存感。`
          };
          return lines[subKey] || `除了主貓格，你身上也有一点 ${subName}。`;
        }

        const linesEn = {
          black: `You also carry a little ${subName} energy.`,
          cow: `You sometimes switch into a very ${subName} channel.`,
          tabby: `Alongside your main type, you also carry a little ${subName} survival instinct.`
        };
        return linesEn[subKey] || `Alongside your main type, you also carry a little ${subName} energy.`;
      }

      function updateResultUI() {
        if (!currentCat) return;

        const data = catData[currentCat][currentLang];
        document.getElementById("type").innerText = data.name;
        document.getElementById("catImg").src = imageMap[currentCat];
        document.getElementById("catImg").alt = data.name;
        document.getElementById("desc").innerText = data.desc.join("\n\n");
        document.getElementById("result-tags").innerHTML = data.tags
          .map((tag) => `<span class="result-tag">${tag}</span>`)
          .join("");

        const subEl = document.getElementById("subCat");
        if (secondaryCat) {
          subEl.innerText = secondaryLine(currentCat, secondaryCat);
          subEl.classList.remove("hidden");
        } else {
          subEl.innerText = "";
          subEl.classList.add("hidden");
        }

        updateStaticUI();
      }

      function saveResultAsImage() {
        const card = document.getElementById("result-capture-card");
        if (!card || typeof html2canvas === "undefined") return;

        html2canvas(card, {
          backgroundColor: null,
          scale: 2,
          useCORS: true
        }).then((canvas) => {
          const link = document.createElement("a");
          link.download = "my-meowti-result.png";
          link.href = canvas.toDataURL("image/png");
          link.click();
        });
      }

      function renderEncyclopedia() {
        const key = encyclopediaData[encyclopediaIndex];
        const data = catData[key][currentLang];
        const descHTML = data.desc.map((p) => `<p>${p}</p>`).join("");

        document.getElementById("encyclopedia-content").innerHTML = `
          <div class="wiki-card">
            <img src="${imageMap[key]}" class="cat-img" alt="${data.name}">
            <div class="wiki-name">${data.name}</div>
            <div class="wiki-short">${data.short}</div>
            <div class="result-tags">
              ${data.tags.map((tag) => `<span class="result-tag">${tag}</span>`).join("")}
            </div>
            <div class="wiki-desc">${descHTML}</div>
          </div>
        `;

        document.getElementById("encyclopedia-dots").innerHTML = encyclopediaData
          .map((_, i) => `<span class="dot ${i === encyclopediaIndex ? "active" : ""}"></span>`)
          .join("");

        updateStaticUI();
      }

      function changeEncyclopedia(step) {
        encyclopediaIndex =
          (encyclopediaIndex + step + encyclopediaData.length) %
          encyclopediaData.length;
        renderEncyclopedia();
      }

      updateStaticUI();
    </script>
  </body>
</html>
