<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MeowTI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=M+PLUS+Rounded+1c:wght@400;500;700;800&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --orange:#f4a11a;
      --orange-deep:#e8930b;
      --brown:#6b4f35;
      --text:#70573d;
      --muted:#9a8b78;
      --cream:#fffaf0;
      --card:rgba(255,253,246,0.92);
      --card-border:#f3e6cb;
      --tag-bg:#fff1cb;
      --tag-text:#8c6844;
      --soft:#f8ecd1;
      --shadow:0 12px 28px rgba(141,105,49,0.09);
      --font-cn:"M PLUS Rounded 1c","PingFang SC","Microsoft YaHei",sans-serif;
      --font-en:"Fredoka","Nunito",sans-serif;
      --font-body:"Nunito","M PLUS Rounded 1c","PingFang SC","Microsoft YaHei",sans-serif;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      background:linear-gradient(rgba(255,248,232,0.72),rgba(255,248,232,0.86));
      color:var(--text);
      font-family:var(--font-body);
    }
    .cn{font-family:var(--font-cn)}
    .en{font-family:var(--font-en)}
    .hidden{display:none!important}
    .app{max-width:680px;margin:0 auto;padding:16px 14px 34px}
    .page-card{
      background:var(--card);
      border:1px solid var(--card-border);
      border-radius:34px;
      box-shadow:var(--shadow);
      padding:26px 20px 24px;
      backdrop-filter:blur(8px);
    }
    .home-page{
      min-height:calc(100vh - 32px);
      display:flex;align-items:center;justify-content:center;text-align:center;
      padding:36px 14px 44px;
      background:url("background.png") center/cover no-repeat;
      border-radius:34px;
    }
    .home-inner{width:100%;max-width:520px}
    .top-right{display:flex;justify-content:flex-end;margin-bottom:22px}
    .lang-group{
      display:inline-flex;gap:6px;padding:6px;background:rgba(255,255,255,.52);
      border:1px solid rgba(255,255,255,.65);border-radius:999px;backdrop-filter:blur(8px)
    }
    .lang-btn{
      border:none;background:transparent;color:var(--brown);font-weight:800;
      font-size:13px;padding:7px 12px;border-radius:999px;cursor:pointer;transition:.18s ease
    }
    .lang-btn.active{background:rgba(255,255,255,.95);color:var(--orange-deep);box-shadow:0 4px 10px rgba(0,0,0,.05)}
    .home-brand{font-size:16px;font-weight:800;color:#b88a2d;letter-spacing:.3px;margin-bottom:10px}
    .home-title{font-size:44px;line-height:1.22;font-weight:800;color:var(--brown);margin:0 0 12px}
    .home-subtitle{font-size:15px;line-height:1.8;color:#8f7a61;margin:0 0 34px}
    .primary-btn{
      width:100%;border:none;border-radius:20px;padding:18px 18px;background:linear-gradient(180deg,#f7ac26 0%,var(--orange) 100%);
      color:#fff;font-size:17px;font-weight:800;cursor:pointer;box-shadow:0 14px 26px rgba(244,161,26,.22);
      transition:.2s ease; margin-top:8px; margin-bottom:34px;
    }
    .primary-btn:hover{transform:translateY(-2px);box-shadow:0 18px 32px rgba(244,161,26,.28)}
    .primary-btn:active{transform:translateY(0)}
    .creator-note{text-align:center;color:var(--muted);font-size:13px;line-height:1.85;margin-top:24px}
    .creator-note a{color:var(--orange-deep);text-decoration:none;font-weight:800}
    .topbar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:18px}
    .topbar-left{display:flex;align-items:center;gap:8px}
    .mini-btn{
      width:38px;height:38px;border-radius:50%;border:1px solid #eedfbe;background:rgba(255,255,255,.92);
      color:var(--brown);font-size:18px;cursor:pointer
    }
    .brand{flex:1;text-align:center;font-weight:700;color:var(--brown);font-size:15px;font-family:var(--font-en)}
    .quiz-page,.result-page,.gallery-page{
      background:
        linear-gradient(rgba(255,248,232,0.66),rgba(255,248,232,0.82)),
        url("meowti-inner-bg.png") center/cover no-repeat;
      border-radius:34px;
    }
    .quiz-tip{text-align:center;font-size:12px;color:#9c9589;line-height:1.7;min-height:20px;margin:0}
    .progress-wrap{width:100%;height:10px;background:#fff3c4;border-radius:999px;position:relative;margin:0 0 18px}
    .progress-bar{width:0;height:100%;background:var(--orange);border-radius:999px;transition:.35s ease}
    .cat-runner{position:absolute;top:-23px;left:0;transform:translateX(-50%);font-size:19px;transition:.35s ease}
    .progress-text{text-align:center;font-size:14px;color:var(--orange-deep);font-weight:800;margin-bottom:16px}
    .question-title{text-align:center;font-size:28px;line-height:1.45;color:var(--brown);font-weight:800;margin:0 0 18px}
    .option-btn{
      width:100%;text-align:left;border:1.5px solid #f1e5c8;background:rgba(255,255,255,.94);color:var(--brown);
      border-radius:20px;padding:20px 18px;margin-bottom:16px;font-size:15px;line-height:1.72;cursor:pointer;
      box-shadow:0 2px 8px rgba(0,0,0,.03);transition:.2s ease
    }
    .option-btn:hover{transform:translateY(-2px);box-shadow:0 10px 20px rgba(0,0,0,.08);background:#fffaf0;border-color:#edcf88}
    .option-btn.selected{background:#fff4d8;border-color:var(--orange);box-shadow:0 10px 20px rgba(244,161,26,.14)}
    .secondary-btn{
      width:100%;background:#f8f8f8;color:#8e8e8e;border:1px solid #ececec;border-radius:16px;padding:12px 14px;cursor:pointer;
      font-size:14px;transition:.18s ease;box-shadow:0 2px 8px rgba(0,0,0,.02)
    }
    .secondary-btn:hover{background:#f3f3f3;transform:translateY(-1px)}
    .main-card,.mix-card,.gallery-card{
      background:rgba(255,255,255,.84);border:1px solid #f3e8d3;border-radius:24px;padding:20px 16px;
      box-shadow:0 6px 20px rgba(141,105,49,.05);margin-bottom:16px
    }
    .result-head{text-align:center;color:var(--brown);font-weight:700;font-size:16px;margin-bottom:8px}
    .result-name{text-align:center;font-size:34px;font-weight:800;color:var(--orange-deep);line-height:1.3;margin-bottom:14px}
    .cat-img{display:block;width:100%;max-width:310px;aspect-ratio:4/3;object-fit:cover;border-radius:24px;margin:0 auto 16px;border:1px solid #f5e7ca;box-shadow:0 8px 22px rgba(141,105,49,.1);background:#fff}
    .tags{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;margin-bottom:12px}
    .tag{background:var(--tag-bg);color:var(--tag-text);border-radius:999px;padding:8px 14px;font-size:13px;font-weight:700}
    .result-hook{text-align:center;font-size:15px;line-height:1.8;color:var(--brown);font-weight:700;margin:2px 0 12px}
    .short-line{text-align:center;color:var(--muted);font-size:15px;margin-bottom:14px}
    .desc-short,.desc-full,.gallery-desc{font-size:15.5px;line-height:1.95;color:var(--text)}
    .desc-full p,.gallery-desc p{margin:0 0 12px}
    .center{text-align:center}
    .detail-toggle{
      display:inline-block;border:1px solid #f0dfbe;background:rgba(255,255,255,.96);color:var(--brown);border-radius:16px;padding:10px 14px;
      font-size:14px;font-weight:800;cursor:pointer;transition:.2s ease;margin-top:4px
    }
    .detail-toggle:hover{transform:translateY(-1px);background:#fffdfa}
    .detail-wrap{margin-top:14px;padding-top:14px;border-top:1px dashed #ecdcb8}
    .mix-title{font-size:18px;font-weight:800;color:var(--brown);margin-bottom:12px;text-align:center}
    .mix-row{margin-bottom:12px}
    .mix-row:last-child{margin-bottom:0}
    .mix-label{display:flex;justify-content:space-between;gap:10px;font-size:14px;margin-bottom:6px;color:var(--brown);font-weight:700}
    .bar-bg{width:100%;height:10px;background:#f6ecd7;border-radius:999px;overflow:hidden}
    .bar-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,#f6b33a,var(--orange))}
    .actions{margin-top:18px}
    .share-btn,.retry-btn,.gallery-link{
      width:100%;display:block;text-align:center;border-radius:18px;font-weight:800;transition:.2s ease;cursor:pointer;text-decoration:none
    }
    .share-btn{border:1px solid #f0dfbe;background:rgba(255,255,255,.96);color:var(--brown);padding:14px;margin-bottom:12px}
    .retry-btn{border:none;background:linear-gradient(180deg,#f7ac26 0%,var(--orange) 100%);color:white;padding:16px;margin-bottom:12px;box-shadow:0 10px 24px rgba(244,161,26,.24)}
    .gallery-link{color:var(--muted);font-size:14px;padding:6px 0}
    .share-btn:hover,.retry-btn:hover,.gallery-link:hover{transform:translateY(-2px)}
    .gallery-title{font-size:24px;font-weight:800;color:var(--brown);text-align:center;margin:0 0 12px}
    .gallery-short{text-align:center;color:var(--muted);font-size:15px;margin-bottom:10px}
    .gallery-nav{display:flex;justify-content:space-between;align-items:center;gap:16px;margin-top:18px}
    .mini-secondary{width:auto;padding:10px 18px}
    .dots{display:flex;gap:8px;align-items:center;justify-content:center}
    .dot{width:9px;height:9px;border-radius:999px;background:#e8ddc0;display:inline-block}
    .dot.active{background:var(--orange)}
    #loading-layer{
      position:fixed;inset:0;background:rgba(255,255,255,.98);z-index:9999;display:flex;justify-content:center;align-items:center;flex-direction:column;padding:20px
    }
    #loading-video{width:100%;max-width:420px;background:#fff;border-radius:22px;display:block}
    #loading-text{margin-top:14px;font-size:15px;font-weight:700;color:var(--brown);text-align:center}
    #shareCapture{
      background:rgba(255,253,246,.98);border:1px solid #f3e6cb;border-radius:28px;padding:18px 16px 16px;margin-bottom:12px;
    }
    .share-footer{text-align:center;color:var(--muted);font-size:13px;line-height:1.8;margin-top:14px}
    @media (max-width:640px){
      .app{padding:12px 12px 24px}
      .page-card{padding:24px 18px 22px}
      .home-page{padding:30px 12px 40px}
      .home-title{font-size:36px}
      .question-title{font-size:24px}
      .result-name{font-size:30px}
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/opencc-js@1.0.5/dist/umd/full.min.js"></script>
</head>
<body>
  <div id="loading-layer" class="hidden">
    <video id="loading-video" muted playsinline preload="auto">
      <source src="loading-cat.mp4" type="video/mp4" />
    </video>
    <div id="loading-text"></div>
  </div>

  <div class="app">
    <section id="home" class="page-card home-page">
      <div class="home-inner">
        <div class="topbar" style="margin-bottom:22px">
          <div class="topbar-left">
            <button class="mini-btn" onclick="showGallery()" title="看看别的小猫">≡</button>
          </div>
          <div class="lang-group">
            <button class="lang-btn" data-lang="zh-Hant" onclick="setLang('zh-Hant')">繁</button>
            <button class="lang-btn active" data-lang="zh-Hans" onclick="setLang('zh-Hans')">简</button>
            <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
          </div>
        </div>
        <div id="homeBrand" class="home-brand cn"></div>
        <h1 id="homeTitle" class="home-title cn"></h1>
        <p id="homeSubtitle" class="home-subtitle cn"></p>
        <button id="startBtn" class="primary-btn cn" onclick="startQuiz()"></button>
        <div id="homeCreator" class="creator-note cn"></div>
      </div>
    </section>

    <section id="quiz" class="page-card quiz-page hidden">
      <div class="topbar">
        <div class="topbar-left">
          <button class="mini-btn" onclick="showGallery()" title="看看别的小猫">≡</button>
          <button class="mini-btn" onclick="goHome()">×</button>
        </div>
        <div class="brand">MeowTI</div>
        <div class="lang-group">
          <button class="lang-btn" data-lang="zh-Hant" onclick="setLang('zh-Hant')">繁</button>
          <button class="lang-btn active" data-lang="zh-Hans" onclick="setLang('zh-Hans')">简</button>
          <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
        </div>
      </div>
      <p id="quizTip" class="quiz-tip cn"></p>
      <br>
      <div class="progress-wrap">
        <div id="progressBar" class="progress-bar"></div>
        <div id="catRunner" class="cat-runner">🐱</div>
      </div>
      <div id="progressText" class="progress-text en"></div>
      <h2 id="questionTitle" class="question-title cn"></h2>
      <div id="optionsBox"></div>
      <button id="prevBtn" class="secondary-btn cn hidden" onclick="prevQuestion()"></button>
    </section>

    <section id="result" class="page-card result-page hidden">
      <div class="topbar">
        <div class="topbar-left">
          <button class="mini-btn" onclick="showGallery()" title="看看别的小猫">≡</button>
          <button class="mini-btn" onclick="goHome()">×</button>
        </div>
        <div class="brand">MeowTI</div>
        <div class="lang-group">
          <button class="lang-btn" data-lang="zh-Hant" onclick="setLang('zh-Hant')">繁</button>
          <button class="lang-btn active" data-lang="zh-Hans" onclick="setLang('zh-Hans')">简</button>
          <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
        </div>
      </div>

      <div id="shareCapture">
        <div class="main-card">
          <div id="resultHead" class="result-head cn"></div>
          <div id="resultName" class="result-name cn"></div>
          <img id="resultImg" class="cat-img" alt="cat">
          <div id="resultTags" class="tags"></div>
          <div id="resultHook" class="result-hook cn"></div>
          <div id="resultShortLine" class="short-line cn"></div>
          <div id="resultShortDesc" class="desc-short cn"></div>
          <div class="center">
            <button id="detailToggle" class="detail-toggle cn" onclick="toggleDetail()"></button>
          </div>
          <div id="detailWrap" class="detail-wrap hidden">
            <div id="resultFullDesc" class="desc-full cn"></div>
          </div>
        </div>

        <div class="mix-card">
          <div id="mixTitle" class="mix-title cn"></div>
          <div id="mixRows"></div>
        </div>

        <div id="shareFooter" class="share-footer"></div>
      </div>

      <div class="actions">
        <button id="shareBtn" class="share-btn cn" onclick="saveShareImage()"></button>
        <button id="retryBtn" class="retry-btn cn" onclick="restartQuiz()"></button>
        <a id="galleryLink" class="gallery-link cn" onclick="showGallery()"></a>
      </div>
      <div id="resultCreator" class="creator-note cn"></div>
    </section>

    <section id="gallery" class="page-card gallery-page hidden">
      <div class="topbar">
        <div class="topbar-left">
          <button class="mini-btn" onclick="showResult()">←</button>
        </div>
        <div class="brand">MeowTI</div>
        <div class="lang-group">
          <button class="lang-btn" data-lang="zh-Hant" onclick="setLang('zh-Hant')">繁</button>
          <button class="lang-btn active" data-lang="zh-Hans" onclick="setLang('zh-Hans')">简</button>
          <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
        </div>
      </div>
      <div class="gallery-card">
        <img id="galleryImg" class="cat-img" alt="cat">
        <div id="galleryName" class="gallery-title cn"></div>
        <div id="galleryTags" class="tags"></div>
        <div id="galleryShort" class="gallery-short cn"></div>
        <div id="galleryDesc" class="gallery-desc cn"></div>
      </div>
      <div class="gallery-nav">
        <button id="galleryPrev" class="secondary-btn mini-secondary cn" onclick="changeGallery(-1)"></button>
        <div id="galleryDots" class="dots"></div>
        <button id="galleryNext" class="secondary-btn mini-secondary cn" onclick="changeGallery(1)"></button>
      </div>
      <div class="center" style="margin-top:18px;">
        <button id="galleryBack" class="secondary-btn cn" style="max-width:220px;" onclick="goHome()"></button>
      </div>
    </section>
  </div>

          { zh:"耳朵先转过去，身体不动。", en:"Turn my ears first, body stays still.", add:{tabby:3,black:2,maine:1,ragdoll:0,siamese:0,british:0,cow:0,chinchilla:0}},
          { zh:"立刻过去看，看到底什么东西敢打扰本喵。", en:"Go check immediately. Who dares disturb me?", add:{tabby:3,siamese:2,maine:1,cow:1,ragdoll:-1,black:0,british:0,chinchilla:-1}},
          { zh:"不知道发生了什么，但是先炸一下毛吧！", en:"No idea what happened, but I’m puffing up first.", add:{cow:3,black:2,tabby:1,siamese:1,ragdoll:-1,british:-1,maine:0,chinchilla:-1}},
          { zh:"假装没听见，活着就行。", en:"Pretend I heard nothing. Survival first.", add:{british:3,black:1,chinchilla:1,ragdoll:0,maine:0,tabby:0,siamese:-1,cow:0}},
          { zh:"什么动静啊！我先躲起来了！", en:"What was that? I’m hiding first!", add:{black:3,tabby:2,chinchilla:1,ragdoll:-1,maine:0,british:0,siamese:-1,cow:0}}
        ]
      },
      {
        id: 11,
        zh: "别猫骂我——",
        en: "Another cat yells at me—",
        options: [
          { zh:"当场哈回去，输气势也不能输阵。", en:"Hiss back immediately. I may lose the fight, but not the attitude.", add:{siamese:3,cow:2,maine:1,black:1,ragdoll:-1,british:0,tabby:0,chinchilla:-1}},
          { zh:"呜呜呜求你别骂我了。", en:"Please stop yelling at me…", add:{ragdoll:3,british:1,black:0,siamese:0,chinchilla:0,cow:-1,tabby:-1,maine:-1}},
          { zh:"偷吃两口猫粮，假装无事发生。", en:"Steal a few bites of food and act like nothing happened.", add:{cow:3,tabby:2,british:1,ragdoll:0,black:0,siamese:0,maine:-1,chinchilla:-1}},
          { zh:"懒得吵，你爱怎么样怎么样吧。", en:"Too lazy to argue. Do whatever you want.", add:{british:3,maine:1,black:1,ragdoll:0,tabby:0,siamese:-1,cow:0,chinchilla:1}},
          { zh:"吃我一记喵喵拳！", en:"Take this meow meow punch!", add:{siamese:3,cow:2,tabby:1,ragdoll:-1,british:-1,black:0,maine:0,chinchilla:-1}}
        ]
      },
      {
        id: 12,
        zh: "别猫靠近我的饭，我会——",
        en: "If another cat comes near my food, I will—",
        options: [
          { zh:"开启狂炫模式。", en:"Eat faster than ever.", add:{tabby:3,british:2,siamese:1,cow:1,ragdoll:0,maine:0,black:0,chinchilla:-1}},
          { zh:"用身体挡住。", en:"Block it with my body.", add:{maine:3,tabby:2,black:1,ragdoll:0,siamese:0,british:0,cow:0,chinchilla:-1}},
          { zh:"再靠近我就哈你了！", en:"One more step and I hiss.", add:{siamese:3,maine:1,black:1,cow:1,tabby:1,ragdoll:-1,british:-1,chinchilla:-1}},
          { zh:"吃我一记喵喵拳！", en:"Take a meow meow punch!", add:{cow:3,siamese:2,tabby:1,ragdoll:-1,british:-1,black:0,maine:0,chinchilla:-1}},
          { zh:"那就一起吃。", en:"Fine, we can share.", add:{ragdoll:3,siamese:1,british:1,tabby:0,cow:0,maine:0,chinchilla:0,black:-1}},
          { zh:"呜呜呜你吃吧，我一点都不心痛。", en:"Go ahead then. It’s not like I’m heartbroken or anything.", add:{ragdoll:2,chinchilla:2,ragdoll2:0,maine:-1,tabby:-1,siamese:0,british:0,black:0,cow:0}}
        ]
      },
      {
        id: 14,
        zh: "面对喜欢的东西，我会——",
        en: "When I face something I really like, I will—",
        options: [
          { zh:"直接扑上去，抢到再说。", en:"Pounce first. Figure the rest out later.", add:{siamese:3,cow:2,tabby:2,ragdoll:0,maine:0,british:0,black:-1,chinchilla:-1}},
          { zh:"先盯着看，确认没人跟我抢。", en:"Watch first and make sure nobody else is taking it.", add:{tabby:3,black:1,chinchilla:1,maine:1,ragdoll:0,siamese:0,british:0,cow:0}},
          { zh:"表现得不明显，但会一直偷偷靠近。", en:"Act casual, but slowly keep moving closer.", add:{ragdoll:3,black:2,chinchilla:1,maine:0,siamese:0,british:0,tabby:0,cow:0}},
          { zh:"嘴上不稀罕，身体已经诚实过去了。", en:"Pretend I don’t care, while my body heads right over.", add:{chinchilla:2,siamese:2,ragdoll:1,cow:1,black:0,maine:0,british:0,tabby:0}},
          { zh:"真喜欢的话，反而会有点谨慎。", en:"If I truly like it, I become more careful.", add:{chinchilla:3,ragdoll:2,black:1,tabby:1,maine:0,siamese:-1,british:0,cow:-1}}
        ]
      },
      {
        id: 16,
        zh: "最不能惹到本猫的地方是——",
        en: "The quickest way to annoy me is—",
        options: [
          { zh:"我正吃着呢，你还来烦我。", en:"Bothering me while I’m eating.", add:{tabby:3,siamese:1,british:1,ragdoll:0,maine:0,black:0,cow:0,chinchilla:0}},
          { zh:"睡着了还把我弄醒，啥意思？", en:"Waking me up for no good reason.", add:{british:3,chinchilla:2,ragdoll:1,maine:0,black:0,cow:-1,tabby:0,siamese:-1}},
          { zh:"我已经往后退了，你还非要贴上来。", en:"I already backed away and you still kept coming closer.", add:{black:3,tabby:2,chinchilla:1,maine:1,ragdoll:-1,siamese:0,british:0,cow:0}},
          { zh:"不许动本喵的东西。", en:"Touching my stuff.", add:{maine:3,tabby:2,black:1,ragdoll:0,siamese:0,british:0,cow:0,chinchilla:0}},
          { zh:"一会儿来逗我，一会儿又不理我。", en:"Giving me attention, then suddenly ignoring me.", add:{ragdoll:3,chinchilla:2,siamese:1,maine:0,black:0,british:0,cow:0,tabby:-1}},
          { zh:"当着我的面摸别的小猫。", en:"Petting another cat right in front of me.", add:{chinchilla:3,siamese:2,ragdoll:1,maine:0,black:0,british:0,cow:0,tabby:-1}}
        ]
      },
      {
        id: 17,
        zh: "好朋猫饿得喵喵叫，你的反应是——",
        en: "A close cat friend is meowing from hunger. My reaction is—",
        options: [
          { zh:"我这儿还有两口，先垫吧垫吧。", en:"I still have a few bites left. Here, have some.", add:{ragdoll:3,british:1,chinchilla:1,ragdoll2:0,black:-1,tabby:0,cow:0,maine:0,siamese:0}},
          { zh:"这附近没罐头香味吗，自己闻着去找。", en:"Can’t you smell where the food is? Go find it.", add:{tabby:3,maine:1,black:1,ragdoll:-1,siamese:0,british:0,cow:0,chinchilla:0}},
          { zh:"走走走，一起去厨房门口蹲着，等人类心虚。", en:"Come on, let’s sit by the kitchen and guilt the humans together.", add:{siamese:3,cow:2,tabby:1,ragdoll:1,black:0,maine:0,british:0,chinchilla:-1}},
          { zh:"先忍忍嘛，饿一会儿又不会立刻变小猫干。", en:"Just hold on a bit. You won’t turn into dried kitten immediately.", add:{british:3,maine:1,chinchilla:1,ragdoll:0,black:0,cow:0,tabby:0,siamese:-1}},
          { zh:"走，我带你去翻翻，看哪里有能吃的。", en:"Come with me, I’ll help you look for food.", add:{tabby:3,ragdoll:1,siamese:1,cow:1,black:0,maine:0,british:0,chinchilla:-1}},
          { zh:"你先别叫了，叫得我都跟着有点饿。", en:"Could you stop meowing? You’re making me hungry too.", add:{maine:2,chinchilla:2,british:1,ragdoll:0,siamese:0,black:0,cow:0,tabby:0}}
        ]
      },
      {
        id: 18,
        zh: "说到活动筋骨，本猫一般是——",
        en: "When it comes to moving my body, I’m usually—",
        options: [
          { zh:"跑！蹿！跳！", en:"Run! Dash! Jump!", add:{siamese:3,cow:2,tabby:2,ragdoll:-1,british:-1,black:0,maine:0,chinchilla:-1}},
          { zh:"风雨无法撼动我睡觉的决心。", en:"Nothing can shake my commitment to sleeping.", add:{british:3,chinchilla:2,ragdoll:1,black:0,cow:-1,tabby:-1,maine:0,siamese:-1}},
          { zh:"慢慢走、伸伸爪，活动活动就差不多了。", en:"A slow walk, a stretch, and that’s enough exercise.", add:{british:3,ragdoll:2,chinchilla:1,tabby:0,black:0,maine:0,siamese:0,cow:-1}},
          { zh:"要么不动，要么跑酷。", en:"Either no movement at all, or full parkour.", add:{cow:3,siamese:1,tabby:1,ragdoll:-1,maine:0,british:0,black:0,chinchilla:-1}},
          { zh:"晚安。", en:"Good night.", add:{british:3,ragdoll:1,black:1,chinchilla:1,maine:0,tabby:-1,siamese:-1,cow:-1}},
          { zh:"白天省电，晚上发疯，这很合理吧。", en:"Saving energy by day, losing it by night. Perfectly reasonable.", add:{black:3,cow:2,siamese:1,ragdoll:-1,maine:0,british:0,tabby:0,chinchilla:0}}
        ]
      },
      {
        id: 20,
        zh: "真要出门玩，本猫比较适合在——",
        en: "If I were to go out and have fun, I’d probably be best at—",
        options: [
          { zh:"白天，亮堂堂的，正适合到处晃。", en:"Daytime, when everything is bright and easy to roam around.", add:{tabby:3,siamese:2,cow:1,ragdoll:0,maine:0,british:0,chinchilla:0,black:-1}},
          { zh:"傍晚，比较有感觉。", en:"Around dusk. Better atmosphere.", add:{chinchilla:2,black:2,ragdoll:1,british:1,maine:0,siamese:0,cow:0,tabby:0}},
          { zh:"不到晚上不出门。", en:"I don’t go out before nightfall.", add:{black:3,cow:2,chinchilla:1,ragdoll:-1,maine:0,siamese:0,british:0,tabby:0}},
          { zh:"几点都行，真有局就喊我。", en:"Just call me.", add:{siamese:3,ragdoll:1,cow:1,tabby:1,maine:0,british:0,black:-1,chinchilla:-1}},
          { zh:"不是不出，是缓出、慢出、优出。", en:"It’s not that I won’t go out. I just prefer to go out slowly and elegantly.", add:{chinchilla:3,ragdoll:1,british:1,black:1,maine:0,tabby:0,siamese:-1,cow:-1}},
          { zh:"下过雨最好，空气里全是新鲜味道。", en:"Right after rain. The air smells brand new.", add:{tabby:3,black:2,chinchilla:1,ragdoll:0,maine:0,siamese:0,british:0,cow:0}}
        ]
      }
    ];

    // cleanup any accidental helper key in options
    questionsMaster.forEach(q => q.options.forEach(o => { delete o.add.ragdoll2; }));

    let currentLang = "zh-Hans";
    let currentPage = "home";
    let questionOrder = [];
    let currentIndex = 0;
    let selectedHistory = [];
    let scores = {};
    let currentResult = null;
    let detailOpen = false;
    let galleryIndex = 0;

    function resetScores() {
      scores = {ragdoll:0, maine:0, siamese:0, british:0, black:0, cow:0, tabby:0, chinchilla:0};
    }

    function shuffleArray(arr){
      const copy = [...arr];
      for(let i=copy.length-1;i>0;i--){
        const j = Math.floor(Math.random()*(i+1));
        [copy[i],copy[j]]=[copy[j],copy[i]];
      }
      return copy;
    }

    function ensureCN(text){
      if(currentLang === "zh-Hant" && window.OpenCC){
        const converter = OpenCC.Converter({from:'cn', to:'tw'});
        return converter(text);
      }
      return text;
    }

    function getText(obj){
      if(currentLang === "en") return obj.en;
      return ensureCN(obj.zh);
    }

    function getCreatorURL(){ return currentLang === "en" ? creatorUrls.en : creatorUrls.zh; }

    function setLang(lang){
      currentLang = lang;
      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === lang);
      });
      renderAll();
    }

    function renderAll(){
      renderHome();
      if(currentPage === 'quiz') renderQuestion();
      if(currentPage === 'result') renderResult();
      if(currentPage === 'gallery') renderGallery();
    }

    function renderHome(){
      const t = currentLang === 'en' ? uiText.en : uiText["zh-Hans"];
      document.getElementById('homeBrand').innerText = currentLang === 'en' ? t.homeBrand : ensureCN(t.homeBrand);
      document.getElementById('homeTitle').innerHTML = currentLang === 'en' ? t.homeTitle : ensureCN(t.homeTitle);
      document.getElementById('homeSubtitle').innerText = currentLang === 'en' ? t.homeSubtitle : ensureCN(t.homeSubtitle);
      document.getElementById('startBtn').innerText = currentLang === 'en' ? t.startBtn : ensureCN(t.startBtn);
      const handle = currentLang === 'en' ? t.creatorHandle : ensureCN(t.creatorHandle);
      document.getElementById('homeCreator').innerHTML = `MeowTI · <a href="${getCreatorURL()}" target="_blank">${handle}</a>`;
      document.getElementById('loadingText').innerText = currentLang === 'en' ? t.loading : ensureCN(t.loading);
    }

    function startQuiz(){
      questionOrder = shuffleArray(questionsMaster.map((_,i)=>i));
      currentIndex = 0;
      selectedHistory = [];
      resetScores();
      currentResult = null;
      detailOpen = false;
      showLoadingThenQuiz();
    }

    function showLoadingThenQuiz(){
      const layer = document.getElementById('loading-layer');
      const video = document.getElementById('loading-video');
      layer.classList.remove('hidden');
      if(video){
        video.currentTime = 0;
        const p = video.play();
        if(p!==undefined){ p.catch(()=>{}); }
      }
      setTimeout(()=>{
        layer.classList.add('hidden');
        showPage('quiz');
      }, 2200);
    }

    function showPage(id){
      currentPage = id;
      ['home','quiz','result','gallery'].forEach(pid=>{
        document.getElementById(pid).classList.toggle('hidden', pid!==id);
      });
      if(id==='quiz') renderQuestion();
      if(id==='result') renderResult();
      if(id==='gallery') renderGallery();
    }

    function goHome(){ showPage('home'); }
    function showResult(){ showPage('result'); }
    function showGallery(){ galleryIndex = 0; showPage('gallery'); }

    function currentQuestion(){
      return questionsMaster[questionOrder[currentIndex]];
    }

    function renderQuestion(){
      const q = currentQuestion();
      const t = currentLang === 'en' ? uiText.en : uiText["zh-Hans"];
      const factPool = currentLang === 'en' ? coldFacts.en : coldFacts["zh-Hans"];
      const fact = factPool[currentIndex % factPool.length];
      document.getElementById('quizTip').innerText = currentLang === 'en' ? fact : ensureCN(fact);
      document.getElementById('progressText').innerText = `${currentIndex + 1} / ${questionOrder.length}`;
      document.getElementById('questionTitle').innerText = currentLang === 'en' ? q.en : ensureCN(q.zh);
      document.getElementById('prevBtn').innerText = currentLang === 'en' ? t.prevQuestion : ensureCN(t.prevQuestion);
      document.getElementById('prevBtn').classList.toggle('hidden', currentIndex === 0);
      const pct = ((currentIndex + 1) / questionOrder.length) * 100;
      document.getElementById('progressBar').style.width = pct + '%';
      document.getElementById('catRunner').style.left = pct + '%';
      const box = document.getElementById('optionsBox');
      box.innerHTML = '';
      q.options.forEach((opt, idx)=>{
        const btn = document.createElement('button');
        btn.className = 'option-btn ' + (currentLang === 'en' ? 'en' : 'cn');
        btn.textContent = currentLang === 'en' ? opt.en : ensureCN(opt.zh);
        btn.onclick = ()=> answerQuestion(idx);
        box.appendChild(btn);
      });
    }

    function applyAdd(add, sign=1){
      Object.keys(scores).forEach(k=>{
        scores[k] += (add[k] || 0) * sign;
      });
    }

    function answerQuestion(optIndex){
      const q = currentQuestion();
      const opt = q.options[optIndex];
      applyAdd(opt.add, 1);
      selectedHistory.push(optIndex);
      currentIndex++;
      if(currentIndex >= questionOrder.length){
        calculateResult();
        showPage('result');
      } else {
        renderQuestion();
      }
    }

    function prevQuestion(){
      if(currentIndex <= 0) return;
      currentIndex--;
      const prevQ = questionsMaster[questionOrder[currentIndex]];
      const prevOptIndex = selectedHistory.pop();
      applyAdd(prevQ.options[prevOptIndex].add, -1);
      renderQuestion();
    }

    function calculateResult(){
      const sorted = Object.entries(scores).sort((a,b)=>b[1]-a[1]);
      const total = sorted.reduce((sum, [,v])=>sum + Math.max(0, v), 0) || 1;
      currentResult = {
        main: sorted[0][0],
        rankings: sorted.slice(0,3).map(([k,v])=>({key:k, score:v, pct: Math.round(Math.max(0,v) / total * 100)}))
      };
      const sumPct = currentResult.rankings.reduce((s,x)=>s+x.pct,0);
      if(sumPct !== 100 && currentResult.rankings.length > 0){
        currentResult.rankings[0].pct += (100 - sumPct);
      }
    }

    function renderResult(){
      if(!currentResult) return;
      const t = currentLang === 'en' ? uiText.en : uiText["zh-Hans"];
      const d = currentLang === 'en' ? catData[currentResult.main].en : catData[currentResult.main].zh;

      document.getElementById('resultHead').innerText = currentLang === 'en' ? t.resultHead : ensureCN(t.resultHead);
      document.getElementById('resultName').innerText = currentLang === 'en' ? d.name : ensureCN(d.name);
      document.getElementById('resultImg').src = imageMap[currentResult.main];
      document.getElementById('resultImg').alt = currentLang === 'en' ? d.name : ensureCN(d.name);
      document.getElementById('resultHook').innerText = currentLang === 'en' ? d.hook : ensureCN(d.hook);
      document.getElementById('resultShortLine').innerText = currentLang === 'en' ? d.short : ensureCN(d.short);
      document.getElementById('resultShortDesc').innerText = currentLang === 'en' ? d.shortDesc : ensureCN(d.shortDesc);
      const tagsBox = document.getElementById('resultTags');
      tagsBox.innerHTML = '';
      d.tags.forEach(tag=>{
        const span = document.createElement('span');
        span.className = 'tag ' + (currentLang === 'en' ? 'en' : 'cn');
        span.textContent = currentLang === 'en' ? tag : ensureCN(tag);
        tagsBox.appendChild(span);
      });

      document.getElementById('detailToggle').innerText = currentLang === 'en'
        ? (detailOpen ? t.detailClose : t.detailOpen)
        : ensureCN(detailOpen ? t.detailClose : t.detailOpen);

      const detailWrap = document.getElementById('detailWrap');
      detailWrap.classList.toggle('hidden', !detailOpen);
      document.getElementById('resultFullDesc').innerHTML = d.full.map(p => `<p>${currentLang === 'en' ? p : ensureCN(p)}</p>`).join('');

      document.getElementById('mixTitle').innerText = currentLang === 'en' ? t.mixTitle : ensureCN(t.mixTitle);
      const rows = document.getElementById('mixRows');
      rows.innerHTML = '';
      currentResult.rankings.forEach(item=>{
        const cd = currentLang === 'en' ? catData[item.key].en : catData[item.key].zh;
        const row = document.createElement('div');
        row.className = 'mix-row';
        row.innerHTML = `
          <div class="mix-label">
            <span>${currentLang === 'en' ? cd.name.replace(/[^\w\s\-&.]/g,'').trim() : ensureCN(cd.name.replace(/[^\u4e00-\u9fa5A-Za-z0-9\s]/g,'').trim())}</span>
            <span>${item.pct}%</span>
          </div>
          <div class="bar-bg"><div class="bar-fill" style="width:${item.pct}%"></div></div>
        `;
        rows.appendChild(row);
      });

      document.getElementById('shareFooter').innerHTML = `MeowTI · <a href="${getCreatorURL()}" target="_blank">${currentLang === 'en' ? t.creatorHandle : ensureCN(t.creatorHandle)}</a>`;
      document.getElementById('shareBtn').innerText = currentLang === 'en' ? t.shareBtn : ensureCN(t.shareBtn);
      document.getElementById('retryBtn').innerText = currentLang === 'en' ? t.retryBtn : ensureCN(t.retryBtn);
      document.getElementById('galleryLink').innerText = currentLang === 'en' ? t.galleryLink : ensureCN(t.galleryLink);

      const handle = currentLang === 'en' ? t.creatorHandle : ensureCN(t.creatorHandle);
      document.getElementById('resultCreator').innerHTML = `MeowTI · <a href="${getCreatorURL()}" target="_blank">${handle}</a>`;
    }

    function toggleDetail(){
      detailOpen = !detailOpen;
      renderResult();
    }

    function restartQuiz(){
      detailOpen = false;
      startQuiz();
    }

    function renderGallery(){
      const key = Object.keys(catData)[galleryIndex];
      const d = currentLang === 'en' ? catData[key].en : catData[key].zh;
      const t = currentLang === 'en' ? uiText.en : uiText["zh-Hans"];
      document.getElementById('galleryImg').src = imageMap[key];
      document.getElementById('galleryImg').alt = currentLang === 'en' ? d.name : ensureCN(d.name);
      document.getElementById('galleryName').innerText = currentLang === 'en' ? d.name : ensureCN(d.name);
      document.getElementById('galleryShort').innerText = currentLang === 'en' ? d.short : ensureCN(d.short);
      document.getElementById('galleryDesc').innerHTML = d.full.map(p => `<p>${currentLang === 'en' ? p : ensureCN(p)}</p>`).join('');
      const tagBox = document.getElementById('galleryTags');
      tagBox.innerHTML = '';
      d.tags.forEach(tag=>{
        const span = document.createElement('span');
        span.className = 'tag';
        span.textContent = currentLang === 'en' ? tag : ensureCN(tag);
        tagBox.appendChild(span);
      });
      document.getElementById('galleryPrev').innerText = currentLang === 'en' ? t.galleryPrev : ensureCN(t.galleryPrev);
      document.getElementById('galleryNext').innerText = currentLang === 'en' ? t.galleryNext : ensureCN(t.galleryNext);
      document.getElementById('galleryBack').innerText = currentLang === 'en' ? t.galleryBack : ensureCN(t.galleryBack);

      const dots = document.getElementById('galleryDots');
      dots.innerHTML = Object.keys(catData).map((_,i)=>`<span class="dot ${i===galleryIndex?'active':''}"></span>`).join('');
    }

    function changeGallery(step){
      const total = Object.keys(catData).length;
      galleryIndex = (galleryIndex + step + total) % total;
      renderGallery();
    }

    async async function saveShareImage(){
      const capture = document.getElementById('shareCapture');
      const detail = document.getElementById('detailWrap');
      const wasOpen = !detail.classList.contains('hidden');
      if(wasOpen) detail.classList.add('hidden');
      const canvas = await html2canvas(capture, {backgroundColor:null, scale:2, useCORS:true});
      if(wasOpen && detailOpen) detail.classList.remove('hidden');
      const link = document.createElement('a');
      link.download = 'my-meowti-result.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    }

    renderHome();
  </script>
</body>
</html>
